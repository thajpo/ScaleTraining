# Configuration for lm-eval benchmark runs

# Comma-separated list of tasks to evaluate (e.g., hellaswag,mmlu,arc_easy)
# Can also be set via LM_EVAL_TASKS environment variable
tasks: "hellaswag"

# Persist machine-readable evaluation artifacts next to the checkpoint by default.
# An override must still name the run directory that owns <output_dir>/model.pt;
# unrelated output directories fail provenance validation before replacement.
write_results: true
output_dir: null
