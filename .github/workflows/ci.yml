name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Compile source and tests
        run: uv run python -m compileall -q src scripts tests
      - name: Check public entrypoints
        run: |
          uv run python -m scaletraining.entrypoints.prepare_data --help >/tmp/prepare-help.txt
          uv run python -m scaletraining.entrypoints.train --help >/tmp/train-help.txt
          uv run python -m scaletraining.entrypoints.run_evals --help >/tmp/evals-help.txt
          uv run python -m scaletraining.entrypoints.run_lm_eval --help >/tmp/lm-eval-help.txt
          uv run python -m scaletraining.entrypoints.generate_from_pretrained --help >/tmp/generate-help.txt

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Run quick tests
        run: uv run pytest -q

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Run offline CPU smoke
        run: uv run python scripts/smoke_cpu_e2e.py
