name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Run quick tests
        run: uv run pytest -q
      - name: Check public entrypoints import
        run: |
          uv run python -m scaletraining.entrypoints.train --help >/tmp/train-help.txt
          uv run python -m scaletraining.entrypoints.run_evals --help >/tmp/evals-help.txt
          uv run python -m scaletraining.entrypoints.run_lm_eval --help >/tmp/lm-eval-help.txt
